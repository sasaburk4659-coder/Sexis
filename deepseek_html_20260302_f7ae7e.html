<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS + Поиск адресов</title>
    <!-- Leaflet CSS и JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }
        #search-container {
            display: flex;
            padding: 10px;
            background: #ffffff;
            border-bottom: 1px solid #ddd;
            flex-shrink: 0;
        }
        #searchInput {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #ccc;
            border-radius: 30px 0 0 30px;
            outline: none;
            font-size: 16px;
            box-sizing: border-box;
        }
        #searchBtn {
            padding: 10px 20px;
            background-color: #2AABEE;
            color: white;
            border: none;
            border-radius: 0 30px 30px 0;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        #searchBtn:active {
            background-color: #1f8bc1;
        }
        #map {
            flex: 1;
            width: 100%;
        }
        #panel {
            flex-shrink: 0;
            background: #ffffff;
            border-top: 1px solid #e0e0e0;
            padding: 16px;
            text-align: center;
            box-sizing: border-box;
        }
        .coords {
            font-size: 1rem;
            font-weight: 500;
            color: #2c3e50;
            margin-bottom: 6px;
            word-break: break-word;
        }
        .address {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-bottom: 8px;
            word-break: break-word;
        }
        .btn {
            background-color: #2AABEE;
            color: white;
            border: none;
            border-radius: 24px;
            padding: 10px 24px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: background-color 0.2s;
            margin-top: 8px;
        }
        .btn:active {
            background-color: #1f8bc1;
        }
        .note {
            font-size: 0.8rem;
            color: #b0b0b0;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <!-- Строка поиска -->
    <div id="search-container">
        <input type="text" id="searchInput" placeholder="Город или адрес... (например, Москва, Кремль)" value="">
        <button id="searchBtn">Найти</button>
    </div>

    <!-- Карта -->
    <div id="map"></div>

    <!-- Нижняя панель с информацией и кнопками -->
    <div id="panel">
        <div class="coords" id="coords">Определение местоположения...</div>
        <div class="address" id="address"></div>
        <button class="btn" id="refreshBtn">🔄 Моё местоположение</button>
        <div class="note">Нажмите "Моё местоположение", чтобы вернуться к GPS</div>
    </div>

    <script>
        // ------------------------------------------------------------
        // Инициализация карты
        // ------------------------------------------------------------
        const map = L.map('map').setView([55.751244, 37.618423], 10); // Москва как заглушка

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        let marker = null;
        let accuracyCircle = null;

        // ------------------------------------------------------------
        // Функция обновления карты и информации
        // ------------------------------------------------------------
        function updateMap(lat, lon, accuracy = null, placeName = null) {
            // Удаляем старые объекты
            if (marker) map.removeLayer(marker);
            if (accuracyCircle) map.removeLayer(accuracyCircle);

            // Новый маркер
            marker = L.marker([lat, lon]).addTo(map);

            // Круг точности (только если есть accuracy)
            if (accuracy && accuracy > 0) {
                accuracyCircle = L.circle([lat, lon], {
                    radius: accuracy,
                    color: '#2AABEE',
                    fillColor: '#2AABEE',
                    fillOpacity: 0.15,
                    weight: 1
                }).addTo(map);
            }

            // Центрируем карту
            map.setView([lat, lon], 15);

            // Обновляем текстовые поля
            document.getElementById('coords').innerHTML = `📍 ${lat.toFixed(6)}, ${lon.toFixed(6)}`;
            
            if (placeName) {
                // Если есть название места (например, из поиска)
                document.getElementById('address').innerHTML = placeName;
            } else if (accuracy) {
                // Если есть точность (режим GPS)
                document.getElementById('address').innerHTML = `Точность: примерно ${Math.round(accuracy)} м`;
            } else {
                // Если ничего нет
                document.getElementById('address').innerHTML = '';
            }
        }

        // ------------------------------------------------------------
        // Обработка ошибок геолокации
        // ------------------------------------------------------------
        function handleLocationError(error) {
            let message = 'Ошибка получения координат';
            if (error.code === 1) message = '❌ Доступ к геолокации запрещён';
            else if (error.code === 2) message = '❌ Не удалось определить местоположение';
            else if (error.code === 3) message = '❌ Таймаут запроса';
            document.getElementById('coords').innerText = message;
            document.getElementById('address').innerHTML = '';
        }

        // ------------------------------------------------------------
        // Запрос геолокации (GPS)
        // ------------------------------------------------------------
        function requestLocation() {
            document.getElementById('coords').innerText = 'Запрос GPS...';
            document.getElementById('address').innerHTML = '';

            // Проверяем Telegram Mini App
            if (window.Telegram && Telegram.WebApp && typeof Telegram.WebApp.requestLocation === 'function') {
                Telegram.WebApp.requestLocation((location) => {
                    if (location) {
                        const lat = location.lat;
                        const lon = location.long;
                        const accuracy = location.accuracy ? location.accuracy : null;
                        updateMap(lat, lon, accuracy, null);
                    } else {
                        handleLocationError({ code: 1 });
                    }
                });
            } else {
                // Обычный браузер
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            const lat = position.coords.latitude;
                            const lon = position.coords.longitude;
                            const accuracy = position.coords.accuracy;
                            updateMap(lat, lon, accuracy, null);
                        },
                        handleLocationError,
                        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                    );
                } else {
                    document.getElementById('coords').innerText = '❌ Геолокация не поддерживается';
                }
            }
        }

        // ------------------------------------------------------------
        // Поиск места по названию (геокодер Nominatim)
        // ------------------------------------------------------------
        async function searchLocation(query) {
            if (!query.trim()) {
                alert('Введите название города или адреса');
                return;
            }

            document.getElementById('coords').innerText = 'Поиск...';
            document.getElementById('address').innerHTML = '';

            const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`;

            try {
                const response = await fetch(url, {
                    headers: {
                        'User-Agent': 'GPS-Telegram-App/1.0'  // хороший тон для Nominatim
                    }
                });
                const data = await response.json();

                if (data && data.length > 0) {
                    const place = data[0];
                    const lat = parseFloat(place.lat);
                    const lon = parseFloat(place.lon);
                    const displayName = place.display_name;
                    updateMap(lat, lon, null, displayName);
                } else {
                    document.getElementById('coords').innerText = 'Ничего не найдено';
                }
            } catch (error) {
                console.error('Ошибка поиска:', error);
                document.getElementById('coords').innerText = 'Ошибка при поиске';
            }
        }

        // ------------------------------------------------------------
        // Обработчики событий
        // ------------------------------------------------------------
        document.getElementById('refreshBtn').addEventListener('click', requestLocation);

        document.getElementById('searchBtn').addEventListener('click', () => {
            const query = document.getElementById('searchInput').value;
            searchLocation(query);
        });

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = document.getElementById('searchInput').value;
                searchLocation(query);
            }
        });

        // ------------------------------------------------------------
        // Загрузка Telegram WebApp скрипта (если не загружен)
        // ------------------------------------------------------------
        if (!window.Telegram) {
            const script = document.createElement('script');
            script.src = 'https://telegram.org/js/telegram-web-app.js';
            script.onload = () => console.log('Telegram WebApp script loaded');
            document.head.appendChild(script);
        }

        // Автоматически запрашиваем GPS при загрузке (с небольшой задержкой)
        setTimeout(requestLocation, 300);
    </script>
</body>
</html>
